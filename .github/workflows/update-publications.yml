name: Update Publications from Scopus

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
  
  # Run automatically every Sunday at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * 0'

# IMPORTANT: This permission is required to push changes
permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Scopus Data
        env:
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
          SCOPUS_AUTHOR_ID: ${{ secrets.SCOPUS_AUTHOR_ID }}
        run: |
          # Fetch author metrics and save to file
          echo "Fetching author metrics..."
          curl -s -H "Accept: application/json" \
            -H "X-ELS-APIKey: ${SCOPUS_API_KEY}" \
            "https://api.elsevier.com/content/author/author_id/${SCOPUS_AUTHOR_ID}?view=METRICS" \
            -o author_data.json
          
          # Check if author data was fetched successfully
          if [ ! -s author_data.json ]; then
            echo "Error: Failed to fetch author data"
            exit 1
          fi
          
          # Fetch publications and save to file
          echo "Fetching publications..."
          curl -s -H "Accept: application/json" \
            -H "X-ELS-APIKey: ${SCOPUS_API_KEY}" \
            "https://api.elsevier.com/content/search/scopus?query=AU-ID(${SCOPUS_AUTHOR_ID})&sort=-citedby-count&count=100" \
            -o pubs_data.json
          
          # Check if publications data was fetched successfully
          if [ ! -s pubs_data.json ]; then
            echo "Error: Failed to fetch publications data"
            exit 1
          fi
          
          # Debug: show first part of response to verify data
          echo "Author data preview:"
          head -c 500 author_data.json
          echo ""
          
          # Create Node.js script to process data
          cat > process_scopus.js << 'SCRIPT'
          const fs = require('fs');
          
          // Read data from files
          const authorData = JSON.parse(fs.readFileSync('author_data.json', 'utf8'));
          const pubsData = JSON.parse(fs.readFileSync('pubs_data.json', 'utf8'));
          
          // Extract author info
          const authorProfile = authorData['author-retrieval-response']?.[0] || {};
          const coredata = authorProfile?.coredata || {};
          
          // Get h-index from multiple possible locations
          let hIndex = 0;
          if (authorProfile?.['h-index']) {
            hIndex = parseInt(authorProfile['h-index']) || 0;
          } else if (coredata?.['h-index']) {
            hIndex = parseInt(coredata['h-index']) || 0;
          } else if (authorProfile?.['author-profile']?.['h-index']) {
            hIndex = parseInt(authorProfile['author-profile']['h-index']) || 0;
          }
          
          // Debug: log structure if h-index is 0
          if (hIndex === 0) {
            console.log('Debug - Author profile keys:', Object.keys(authorProfile));
            console.log('Debug - Coredata keys:', Object.keys(coredata));
            if (authorProfile?.['author-profile']) {
              console.log('Debug - author-profile keys:', Object.keys(authorProfile['author-profile']));
            }
          }
          
          // Get preferred name
          const preferredName = authorProfile?.['author-profile']?.['preferred-name'] || {};
          const authorName = `${preferredName['given-name'] || ''} ${preferredName['surname'] || ''}`.trim();
          
          // Get affiliation
          const affiliationData = authorProfile?.['author-profile']?.['affiliation-current']?.affiliation;
          const affiliation = Array.isArray(affiliationData) 
            ? affiliationData[0]?.['ip-doc']?.['afdispname'] || ''
            : affiliationData?.['ip-doc']?.['afdispname'] || '';
          
          // Process publications
          const entries = pubsData['search-results']?.entry || [];
          
          // Check for error in search results
          if (pubsData['search-results']?.['opensearch:totalResults'] === '0') {
            console.log('Warning: No publications found in search results');
          }
          
          const publications = entries.map(entry => ({
            title: entry['dc:title'] || 'Untitled',
            authors: entry['dc:creator'] || '',
            journal: entry['prism:publicationName'] || '',
            year: entry['prism:coverDate']?.substring(0, 4) || '',
            volume: entry['prism:volume'] || '',
            issue: entry['prism:issueIdentifier'] || '',
            pages: entry['prism:pageRange'] || '',
            citations: parseInt(entry['citedby-count']) || 0,
            url: entry['prism:doi'] ? `https://doi.org/${entry['prism:doi']}` : '#',
            openAccess: entry['openaccess'] === '1',
            type: entry['subtypeDescription'] || 'Article'
          }));
          
          // Calculate i10-index
          const i10Index = publications.filter(p => p.citations >= 10).length;
          
          // Get total citations from coredata
          const totalCitations = parseInt(coredata['citation-count']) || 
                                 publications.reduce((sum, p) => sum + p.citations, 0);
          
          // Get document count
          const worksCount = parseInt(coredata['document-count']) || publications.length;
          
          // Create final JSON
          const result = {
            _generatedAt: new Date().toISOString(),
            _source: 'Scopus API via GitHub Actions',
            
            authorName: authorName,
            affiliation: affiliation,
            scopusProfile: `https://www.scopus.com/authid/detail.uri?authorId=${process.env.SCOPUS_AUTHOR_ID}`,
            
            metrics: {
              hIndex: hIndex,
              i10Index: i10Index,
              totalCitations: totalCitations,
              worksCount: worksCount,
              lastUpdated: new Date().toISOString().split('T')[0],
              source: 'Scopus'
            },
            
            publications: publications
          };
          
          fs.writeFileSync('content/publications.json', JSON.stringify(result, null, 2));
          console.log(`✓ Saved ${publications.length} publications`);
          console.log(`✓ h-index: ${hIndex}, citations: ${totalCitations}`);
          SCRIPT
          
          # Run the processing script
          node process_scopus.js
          
          # Cleanup temp files
          rm -f author_data.json pubs_data.json process_scopus.js
      
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/publications.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📚 Update publications from Scopus [$(date +'%Y-%m-%d')]"
            git push
          fi
